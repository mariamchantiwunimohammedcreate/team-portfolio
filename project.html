<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>
    <nav class="back-nav">
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    <div class="project-container">
        <!-- Header -->
        <header class="project-header">
            <h1>Our Projects</h1>
            <button class="btn-add-project" onclick="openAddProjectModal()">+ Add New Project</button>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search projects..." class="search-bar" onkeyup="searchProjects()">
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects will be dynamically added here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
            <p>No projects yet. Add your first project!</p>
        </div>
    </div>

    <!-- Add/Edit Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddProjectModal()">&times;</span>
            <h2 id="modalTitle">Add New Project</h2>
            
            <form id="projectForm">
                <div class="form-group">
                    <label for="projectName">Project Name *</label>
                    <input type="text" id="projectName" required placeholder="Enter project name">
                </div>

                <div class="form-group">
                    <label for="projectDescription">Description *</label>
                    <textarea id="projectDescription" required placeholder="Enter project description"></textarea>
                </div>

                <div class="form-group">
                    <label for="projectTechnologies">Technologies (comma-separated) *</label>
                    <input type="text" id="projectTechnologies" required placeholder="e.g., React, Node.js, MongoDB">
                </div>

                <div class="form-group">
                    <label for="projectTeamMembers">Team Members (comma-separated)</label>
                    <input type="text" id="projectTeamMembers" placeholder="e.g., John, Jane, Mike">
                </div>

                <div class="form-group">
                    <label for="projectCode">Code/Repository Link</label>
                    <input type="url" id="projectCode" placeholder="https://github.com/...">
                </div>

                <div class="form-group">
                    <label for="projectLiveDemo">Live Demo Link</label>
                    <input type="url" id="projectLiveDemo" placeholder="https://...">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Save Project</button>
                    <button type="button" class="btn-cancel" onclick="closeAddProjectModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content delete-modal">
            <h2>Delete Project?</h2>
            <p id="deleteMessage">Are you sure you want to delete this project? This action cannot be undone.</p>
            <div class="delete-actions">
                <button class="btn-delete-confirm" onclick="confirmDelete()">Delete</button>
                <button class="btn-delete-cancel" onclick="cancelDelete()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="project.js"></script>
</body>
</html>
